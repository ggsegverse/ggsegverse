on:
  push:
    branches: [main, master]
    paths:
      - DESCRIPTION
      - .github/workflows/update-codemeta.yaml
  workflow_dispatch:

name: update-codemeta

permissions:
  contents: write
  pull-requests: write

jobs:
  update-codemeta:
    uses: ggsegverse/.github/.github/workflows/update-codemeta.yaml@main
    secrets: inherit
    with:
      # write_codemeta() only reads DESCRIPTION + man/, so there is no need to
      # build+install the package. Skipping local::. also sidesteps the current
      # attach.R build break while ggseg.hub is being folded into ggsegverse.
      extra-packages: any::codemetar
